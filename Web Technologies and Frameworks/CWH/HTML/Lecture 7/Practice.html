<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="This is a job application form for candidates applying for various positions in the company. The form collects essential information such as name, age, phone number, email, address, experience, position applied for, and allows candidates to upload their resume.">
    <title>Job Application</title>
</head>

<body>
    <h1>Job Application Form</h1>
    <form action="post">
        <div>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter your name" autofocus required>
        </div>
        <div>
            <label for="age">Age:</label>
            <input type="number" id="age" name="age" placeholder="Enter your age" required>
        </div>
        <div>
            <label for="phone">Phone Number:</label>
            <input type="text" pattern="[0-9]{10}" id="phone" name="phone" placeholder="Enter your Phone Number" required>
        </div>
        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>
        </div>
        <div>
            <label for="address">Address:</label>
            <input type="text" id="address" name="address" placeholder="Enter your address" required>
        </div>
        <div>
            <label for="experience">Experience:</label>
            <textarea type="text" pattern="[a-zA-Z0-9]{10}" id="experience" name="experience" rows="1" cols="25"
                placeholder="Enter your experience" required></textarea>
        </div>
        <div>
            <label for="position">Position Applied For:</label>
            <select name="position" required>
                <option value="" select disabled>Choose an option</option>
                <option value="frontend">Frontend Developer</option>
                <option value="backend">Backend Developer</option>
                <option value="fullstack">Fullstack Developer</option>
                <option value="designer">UI/UX Designer</option>
            </select>
        </div>
        <div>
            <label for="resume">Upload Resume:</label>
            <input type="file" id="resume" name="resume" accept=".pdf, .docx" required>
        </div>
        <div>
            <input type="submit" value="Apply">
        </div>

    </form>
</body>

</html>
