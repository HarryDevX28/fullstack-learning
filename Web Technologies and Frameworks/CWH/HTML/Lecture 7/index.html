<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms - Lets Learn</title>
</head>

<body>
    <h1>Form for Students who are interested in Web Development</h1>
    <form action="post">
        <div>
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" placeholder="Enter your name" >
        </div>
        <div>
            <label for="age">Age:</label>
            <input type="number" id="age" name="age" placeholder="Enter your age" >
        </div>
        <div>
            <label for="gender">Gender:</label>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>
            <input type="radio" id="others" name="gender" value="others">
            <label for="others">Others</label>
        </div>
        <div>
            <input type="checkbox" id="subscribe" name="subscribe" value="yes">
            <label for="subscribe">Subscribe to newsletter</label>
        </div>
        <div>
            <label for="comment">Comment here:</label>
            <br>
            <textarea id="comment" name="comment" rows="4" cols="50" placeholder="Enter your comment here..." ></textarea>
        </div>
        <div>
            <label for="technologies">Select your favorite Technology:</label>
            <select name="technologies">
                <option value="null">Select an option</option>
                <option value="none">None</option>
                <option value="html">HTML</option>
                <option value="css">CSS</option>
                <option value="javascript">JAVASCRIPT</option>
                <option value="react">REACT</option>
            </select>
        </div> 
    </form>
</body>

</html>
